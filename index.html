document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 ['assets/hd/a14.jpg', 'assets/hd/a13.jpg', 'assets/hd/a12.jpg', 'assets/hd/a10.jpg', 'assets/hd/a11.jpg'],\n      ['assets/hd/a09.jpg', 'assets/hd/a08.jpg'],\n      ['assets/hd/a07.jpg', 'assets/hd/a06.jpg'],\n      ['assets/hd/a03.jpg', 'assets/hd/a04.jpg', 'assets/hd/a05.jpg'],\n      ['assets/hd/a00.jpg', 'assets/hd/a01.jpg', 'assets/hd/a02.jpg']\n    ];\n  }\n\n  base() {\n    return [\n      { accent: '#EF8A17', img: 'assets/sj/web01.jpg', dir: 'row',         year: '2025' },\n      { accent: '#2F8F4E', img: 'assets/hd/a18.jpg', dir: 'row',         year: '2025' },\n      { accent: '#2433C9', img: 'assets/hd/a16.jpg', dir: 'row-reverse', year: '2024' },\n      { accent: '#4AA13F', img: 'assets/hd/a14.jpg', dir: 'row',         year: '2024' },\n      { accent: '#E0331C', img: 'assets/hd/a09.jpg', dir: 'row-reverse', year: '2023' },\n      { accent: '#16B6A4', img: 'assets/hd/a07.jpg', dir: 'row',         year: '2023' },\n      { accent: '#1F7A1F', img: 'assets/hd/a03.jpg', dir: 'row-reverse', year: '2023' },\n      { accent: '#C341E0', img: 'assets/hd/a00.jpg', dir: 'row',         year: '2022' }\n    ];\n  }\n\n  dict() {\n    return {\n      es: {\n        nav: { projects: 'Proyectos', about: 'Sobre mí', contact: 'Contacto' },\n        hero: {\n          role: 'Diseñadora gráfica', tagline: 'enfocada en lo digital',\n          intro: '¡Hola! Soy Constanza, me dicen nini. Diseño experiencias UX/UI, front-end y contenido para redes — y me apasiona enseñar diseño.',\n          cta: 'Ver proyectos', cta2: 'Hablemos', meta: '22 años · Chilena · constante'\n        },\n        marquee: ['UX/UI', 'Front-end', 'RRSS', 'Docencia', 'Prototipado', 'Branding'],\n        work: { title: 'Proyectos', kicker: 'Selección de trabajos', view: 'Ampliar' },\n        about: {\n          kicker: 'Sobre mí',\n          title: 'Diseño con cabeza y con corazón.',\n          body: 'Soy una diseñadora gráfica chilena enfocada en lo digital: UX/UI, front-end y redes sociales. Me muevo entre la estrategia y el detalle, siempre con ganas de aprender algo nuevo.',\n          body2: 'Además me apasiona la docencia en diseño: explicar, acompañar y ver crecer a otras personas es parte de quién soy.',\n          wordsTitle: 'Cómo soy', words: ['Energética', 'Ambiciosa', 'Detallista', 'Empática', 'Con ganas de aprender'],\n          skillsTitle: 'Qué hago', skills: ['UX/UI', 'Front-end', 'RRSS & contenido', 'Docencia']\n        },\n        contact: {\n          kicker: 'Contacto', title: '¿Trabajamos juntas?',\n          body: 'Si tienes una idea en mente o quieres trabajar conmigo, no dudes en acercarte. Me encantan los proyectos con propósito.',\n          linkedin: 'LinkedIn', cv: 'Descargar CV', note: 'Más enlaces muy pronto'\n        },\n        footer: 'Hecho con cariño por nini'\n      },\n      en: {\n        nav: { projects: 'Work', about: 'About', contact: 'Contact' },\n        hero: {\n          role: 'Graphic designer', tagline: 'focused on digital',\n          intro: 'Hi! I\\u2019m Constanza, people call me nini. I design UX/UI experiences, front-end and social content — and I love teaching design.',\n          cta: 'See work', cta2: 'Let\\u2019s talk', meta: '22 y/o · Chilean · constant'\n        },\n        marquee: ['UX/UI', 'Front-end', 'Social', 'Teaching', 'Prototyping', 'Branding'],\n        work: { title: 'Work', kicker: 'Selected projects', view: 'Expand' },\n        about: {\n          kicker: 'About me',\n          title: 'Design with head and heart.',\n          body: 'I\\u2019m a Chilean graphic designer focused on digital: UX/UI, front-end and social media. I move between strategy and detail, always eager to learn something new.',\n          body2: 'I\\u2019m also passionate about teaching design: explaining, mentoring and watching others grow is part of who I am.',\n          wordsTitle: 'Who I am', words: ['Energetic', 'Ambitious', 'Detail-driven', 'Empathetic', 'Always learning'],\n          skillsTitle: 'What I do', skills: ['UX/UI', 'Front-end', 'Social & content', 'Teaching']\n        },\n        contact: {\n          kicker: 'Contact', title: 'Shall we work together?',\n          body: 'If you have an idea in mind or want to work with me, don\\u2019t hesitate to reach out. I love projects with purpose.',\n          linkedin: 'LinkedIn', cv: 'Download CV', note: 'More links coming soon'\n        },\n        footer: 'Made with love by nini'\n      }\n    };\n  }\n\n  renderVals() {\n    const lang = this.state.lang;\n    const t = this.dict()[lang];\n    const projects = this.base().map((b, i) => ({\n      ...b,\n      number: String(i + 1).padStart(2, '0'),\n      title: t.projects ? t.projects[i].title : '',\n      desc: '', role: '', tags: []\n    }));\n    // merge localized project copy\n    const lp = this.projCopy()[lang];\n    const gals = this.galleries();\n    projects.forEach((p, i) => { p.title = lp[i].title; p.desc = lp[i].desc; p.role = lp[i].role; p.tags = lp[i].tags; p.dir = i % 2 === 0 ? 'row' : 'row-reverse'; p.open = () => this.openModal(i); });\n\n    const oi = this.state.openIndex;\n    return {\n      modalOpen: oi !== null,\n      modalTitle: oi !== null ? projects[oi].title : '',\n      modalRole: oi !== null ? projects[oi].role + ' · ' + projects[oi].year : '',\n      modalImages: oi !== null ? gals[oi] : [],\n      modalGallery: oi !== null ? gals[oi].map((src, i) => React.createElement('img', {\n        key: i, src: src, alt: oi !== null ? projects[oi].title : '',\n        style: { display: 'block', width: '100%', borderRadius: '14px', boxShadow: '0 24px 60px -30px rgba(0,0,0,.8)' }\n      })) : null,\n      closeModal: () => this.closeModal(),\n      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n      brand: this.props.accent ?? '#FF2E88',\n      paper: this.props.paper ?? '#F4EFE6',\n      t,\n      projects,\n      projectCount: String(projects.length).padStart(2, '0'),\n      marqueeLoop: t.marquee.concat(t.marquee),\n      langCurrent: lang.toUpperCase(),\n      langOther: lang === 'es' ? 'EN' : 'ES',\n      toggle: () => this.toggleLang()\n    };\n  }\n\n  projCopy() {\n    return {\n      es: [\n        { title: 'SmartJob', role: 'Rediseño web · UX/UI', desc: 'Rediseño UX/UI completo del sitio de SmartJob (smartjob.cl), una software factory impulsada por IA presente en LATAM. Desde la investigación y el prototipado hasta el apoyo corporativo y piezas para redes — participando también en el código y la implementación de front-end.', tags: ['UX/UI', 'Front-end', 'Branding'] },\n        { title: 'EcoTours', role: 'Cotourss · UX/UI', desc: 'Diseño y desarrollo de una nueva web para Cotourss centrada en la interacción del usuario: wireframes, prototipado iterativo e implementación en servidor local.', tags: ['UX/UI', 'Wireframes', 'Prototipado'] },\n        { title: 'Omnio Inspector AI', role: 'Landing · IA', desc: 'Landings para una IA que facilita el escaneo y automatiza la inspección vehicular para compañías de seguros, de la contactabilidad al análisis de daños.', tags: ['Landing', 'IA', 'Branding'] },\n        { title: 'Parque San Alberto', role: 'UX/UI · Reservas', desc: 'Sitio de reservas para el Parque San Alberto Hurtado: agenda de pérgolas, mapa y normas en una experiencia clara y amable.', tags: ['UX/UI', 'Reservas', 'Web'] },\n        { title: 'Portadas Yugen', role: 'Editorial · Japón', desc: 'Proyecto editorial: portadas para la revista ficticia Yugen, que retrata la cultura de Japón y sus aspectos más llamativos a través de tipografía e imagen.', tags: ['Editorial', 'Tipografía', 'Japón'] },\n        { title: 'Rebranding Shell', role: 'Branding · Concepto', desc: 'Un Chile 30 años en el futuro donde Shell se nutre solo de energía sustentable. Rebranding completo: identidad, color y concepto.', tags: ['Branding', 'Concepto', 'Sustentable'] },\n        { title: 'No es lo mismo', role: 'Campaña · Salud Calle', desc: 'Campaña para instalar en la opinión pública que nadie debería morir por una infección tratable. No es lo mismo enfermarse en la calle que con un techo y acceso a salud.', tags: ['Campaña', 'Social', 'Impacto'] },\n        { title: 'El Maricón Chileno', role: 'Editorial · Investigación', desc: 'Investigación sobre las palabras usadas para referirse al hombre homosexual entre los 60 y 90 en Chile, llevada a un glosario gráfico con titulares y archivo de prensa.', tags: ['Editorial', 'Investigación', 'Archivo'] }\n      ],\n      en: [\n        { title: 'SmartJob', role: 'Web redesign · UX/UI', desc: 'Full UX/UI redesign of SmartJob\\u2019s website (smartjob.cl), an AI-driven software factory operating across LATAM. From research and prototyping to corporate support and social pieces — also contributing to the code and front-end implementation.', tags: ['UX/UI', 'Front-end', 'Branding'] },\n        { title: 'EcoTours', role: 'Cotourss · UX/UI', desc: 'Design and development of a new website for Cotourss focused on user interaction: wireframes, iterative prototyping and deployment on a local server.', tags: ['UX/UI', 'Wireframes', 'Prototyping'] },\n        { title: 'Omnio Inspector AI', role: 'Landing · AI', desc: 'Landing pages for an AI that simplifies scanning and automates vehicle inspection for insurance companies — from outreach to damage analysis.', tags: ['Landing', 'AI', 'Branding'] },\n        { title: 'San Alberto Park', role: 'UX/UI · Booking', desc: 'Booking site for Parque San Alberto Hurtado: pergola scheduling, map and rules in a clear, friendly experience.', tags: ['UX/UI', 'Booking', 'Web'] },\n        { title: 'Yugen Covers', role: 'Editorial · Japan', desc: 'Editorial project: covers for the fictional magazine Yugen, portraying Japanese culture and its most striking aspects through type and image.', tags: ['Editorial', 'Typography', 'Japan'] },\n        { title: 'Rebranding Shell', role: 'Branding · Concept', desc: 'A Chile 30 years into the future where Shell runs only on sustainable energy. Full rebrand: identity, color and concept.', tags: ['Branding', 'Concept', 'Sustainable'] },\n        { title: 'It\\u2019s Not the Same', role: 'Campaign · Street Health', desc: 'A campaign to make clear no one should die from a treatable infection. Getting sick on the street is not the same as having a roof and access to healthcare.', tags: ['Campaign', 'Social', 'Impact'] },\n        { title: 'El Maricón Chileno', role: 'Editorial · Research', desc: 'Research into the words used to refer to gay men between the 60s and 90s in Chile, turned into a graphic glossary with headlines and a press archive.', tags: ['Editorial', 'Research', 'Archive'] }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
